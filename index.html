<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FyRPC Login</title>
  <style>
    body {
      font-family: 'K2D', sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: url("https://raw.githubusercontent.com/fyrus7/FyrusApp/heads/main/media/gradientbg5.jpg") no-repeat center center fixed; /* futuristic2.jpg */
      background-size: cover;
    }

.glass-container {
  background: rgba(255, 255, 255, 0.18);
  backdrop-filter: blur(12px);
  border-radius: 16px;
  padding: 40px 30px;
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
  max-width: 400px;
  text-align: center;
  animation: fadeIn 0.4s ease;
}
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.input-box {
  width: 200px;
  padding: 10px;
  font-size: 15px;
  border-radius: 20px;
  background: rgba(255, 255, 255, 0.25);
  border: 1px solid rgba(255,255,255,0.4);
  text-align: center;
  outline: none;
  transition: all 0.2s ease;
}
.input-box:focus {
  border-color: #e83e8c;
  box-shadow: 0 0 10px rgba(232,62,140,0.3);
}

.submit-button {
  width: 120px;
  font-size: 15px;
  color: #ffffff;
  background: linear-gradient(135deg, #6f42c1, #e83e8c);
  padding: 8px 0;
  cursor: pointer;
  border: none;
  border-radius: 20px;
  transition: all 0.2s ease;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  margin-top: 10px;
}
.submit-button:hover:not(:disabled) {
  opacity: 0.9;
}

#toggle-password {
  position: absolute;
  right: 10px;
  top: 35%;
  transform: translateY(-50%);
  cursor: pointer;

  font-size: 18px;
  color: #6f42c1;
}

.login-info-box {
  margin-top: 15px;
  padding: 12px;
  border: 1px solid rgba(0,0,0,0.2);
  border-radius: 10px;
  background: rgba(255,255,255,0.6);
  font-size: 14px;

  display: flex;
  flex-direction: column;
  align-items: center; /* center container */
}

/* Title tengah */
.login-info-title {
  text-align: center;
  font-weight: bold;
  margin-bottom: 8px;
}

/* Wrapper isi */
.login-info-content {
  display: inline-block;   /* penting */
  text-align: left;        /* paksa kiri */
}

  </style>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
  <div class="glass-container">
    <img id="logoImg" src="https://raw.githubusercontent.com/fyrus7/FyrusApp/heads/main/media/flogo.png" alt="Logo" width="200">
    <br><br>

    <form id="login-form" onsubmit="event.preventDefault(); validateLogin();">
      <div style="position: relative; margin-bottom: 5px; display:inline-block;">
        <input type="tel" id="pwd" name="password" class="input-box" placeholder="Enter PIN" pattern="[0-9]*" inputmode="numeric" oninput="this.value = this.value.replace(/[^0-9]/g, '')"><br><br>
        <span id="toggle-password" class="bi bi-eye-slash" style="position:absolute; right:10px; top:35%; transform:translateY(-50%); cursor:pointer; font-size:18px; text-shadow:0 0 1px #455A64;"></span>
      </div>

      <button type="submit" id="submit-btn" class="submit-button">Login</button>
      <div id="error-message" style="color:red; font-weight:bold; margin-top:10px; font-size:18px;"></div>
    </form>

    <br>FyRPC | GitHub Pages + Workers
    <br>
    <div class="login-info-box">
      <div class="login-info-title">Login PIN:</div>
      <div class="login-info-content">
        <div>1234 / admin</div>
        <div>0001 / counter01</div>
        <div>0002 / counter02</div>
        <div>0003 / counter03</div>
      </div>
    </div>
  </div>

<script>
// ================================
// TUKAR URL INI kepada URL Cloudflare Worker awak
// contoh: https://fyrpc-api.username.workers.dev
// ================================
const API_BASE = "https://fyrpc2.iamfyrus.workers.dev";
let isLoggingIn = false;

function apiUrl(path) {
  return API_BASE.replace(/\/$/, "") + path;
}

async function postJson(path, data) {
  const res = await fetch(apiUrl(path), {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data || {})
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

function isMobileDevice() {
  return /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent) || window.innerWidth <= 768;
}

function routeDashboardPage() {
  window.location.href = isMobileDevice() ? "mobile.html" : "desktop.html";
}

function loadDashboard(profile) {
  if (!profile) return;
  profile = String(profile).toLowerCase();
  localStorage.setItem("userProfile", profile);

  if (["mod", "admin"].includes(profile)) {
    showModeratorChoice();
  } else {
    routeDashboardPage();
  }
}

function routeModerator(mode) {
  if (mode === "dashboard") return routeDashboardPage();
  if (mode === "monitor") return window.location.href = "monitor.html";
  if (mode === "admin") return window.location.href = "admin.html";
}

function showModeratorChoice() {
  const modal = document.createElement("div");
  modal.innerHTML = `
    <div id="choiceOverlay" style="position:fixed; inset:0; background:rgba(0,0,0,0.6); display:flex; align-items:center; justify-content:center; z-index:9999;">
      <div id="choiceBox" style="background:rgba(255,255,255,0.95); padding:20px; border-radius:16px; box-shadow:0 15px 40px rgba(0,0,0,0.25); text-align:center; width:280px;">
        <h3 style="margin:0; color:#6f42c1;">Choose Page</h3>
        <div style="display:flex; flex-direction:column; gap:10px; margin-top:15px;">
          <button class="submit-button" style="width:100%;" onclick="routeModerator('dashboard')">Dashboard</button>
          <button class="submit-button" style="width:100%;" onclick="routeModerator('monitor')">Monitor</button>
          <button class="submit-button" style="width:100%;" onclick="routeModerator('admin')">Admin</button>
        </div>
        <button class="submit-button" style="width:100%; background:#aaa; margin-top:12px;" onclick="document.getElementById('choiceOverlay').remove()">Cancel</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
}

async function validateLogin() {
  if (isLoggingIn) return;
  isLoggingIn = true;

  const enteredPassword = document.getElementById("pwd")?.value.trim();
  const submitButton = document.getElementById("submit-btn");
  const errorMessage = document.getElementById("error-message");
  errorMessage.innerText = "";

  if (!enteredPassword) {
    errorMessage.innerText = "Please enter your password.";
    isLoggingIn = false;
    return;
  }

  submitButton.innerText = "Loading...";
  submitButton.disabled = true;

  try {
    const response = await postJson("/login", { password: enteredPassword });
    if (response.success) {
      localStorage.setItem("sessionToken", response.token);
      localStorage.setItem("userProfile", response.profile);
      loadDashboard(response.profile);
    } else {
      errorMessage.innerText = "Wrong Password";
    }
  } catch (err) {
    console.error(err);
    errorMessage.innerText = "Server error. Check API_BASE / Worker CORS.";
  } finally {
    isLoggingIn = false;
    submitButton.innerText = "Login";
    submitButton.disabled = false;
  }
}

window.addEventListener("DOMContentLoaded", async () => {
  const submitButton = document.getElementById("submit-btn");
  const token = localStorage.getItem("sessionToken");

  submitButton.innerText = "Verifying...";
  submitButton.disabled = true;

  if (token) {
    try {
      const response = await postJson("/validate", { token });
      if (response.valid) {
        loadDashboard(response.profile);
        return;
      }
      localStorage.removeItem("sessionToken");
      localStorage.removeItem("userProfile");
    } catch (err) {
      console.error(err);
      localStorage.removeItem("sessionToken");
      localStorage.removeItem("userProfile");
    }
  }

  submitButton.innerText = "Login";
  submitButton.disabled = false;

  const passwordInput = document.getElementById("pwd");
  const toggleIcon = document.getElementById("toggle-password");
  const hidePassword = localStorage.getItem("hidePassword");

  if (hidePassword === "false") {
    passwordInput.type = "text";
    toggleIcon.classList.replace("bi-eye-slash", "bi-eye");
  } else {
    passwordInput.type = "password";
    toggleIcon.classList.replace("bi-eye", "bi-eye-slash");
    localStorage.setItem("hidePassword", "true");
  }

  toggleIcon.addEventListener("click", () => {
    if (passwordInput.type === "password") {
      passwordInput.type = "text";
      toggleIcon.classList.replace("bi-eye-slash", "bi-eye");
      localStorage.setItem("hidePassword", "false");
    } else {
      passwordInput.type = "password";
      toggleIcon.classList.replace("bi-eye", "bi-eye-slash");
      localStorage.setItem("hidePassword", "true");
    }
  });
});
</script>
</body>
</html>
