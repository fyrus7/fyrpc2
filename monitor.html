<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FyRPC Monitor</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<style>
body{font-family:Arial,sans-serif;background:#eef2f5;margin:0;padding:20px}.bar{display:flex;justify-content:space-between;align-items:center;background:#fff;padding:12px;border-radius:12px;box-shadow:0 3px 12px rgba(0,0,0,.08);margin-bottom:18px}button{border:0;border-radius:8px;padding:8px 12px;cursor:pointer;background:#455A64;color:#fff}.danger{background:#d32f2f}.card{background:#fff;border-radius:12px;padding:15px;box-shadow:0 3px 12px rgba(0,0,0,.08)}table{width:100%;border-collapse:collapse}th,td{border-bottom:1px solid #ddd;padding:8px;text-align:left}th{background:#f7f7f7}.spin{animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="bar"><b>Monitor</b><div><button onclick="location.href='desktop.html'">Dashboard</button> <button class="danger" onclick="logout()">Logout</button></div></div>
<div style="display:none"><span id="userProfile"></span></div>
<div class="card"><div id="msg">Loading...</div><table id="tbl" style="display:none"><thead></thead><tbody></tbody></table></div>
<script src="shared.js"></script>
<script>
async function loadMonitor(){
  try{
    const data=await apiJson('/monitor');
    const tbl=document.getElementById('tbl'), thead=tbl.querySelector('thead'), tbody=tbl.querySelector('tbody');
    document.getElementById('msg').style.display='none'; tbl.style.display='table';
    const header=data[0]||['Name','BIB','Status'];
    thead.innerHTML=`<tr>${header.map(h=>`<th>${h||''}</th>`).join('')}<th>Action</th></tr>`;
    tbody.innerHTML=(data.slice(1)||[]).map(r=>`<tr><td>${r[0]||''}</td><td>${r[1]||''}</td><td>${r[2]||''}</td><td>${r[2]==='COLLECTED'?`<button class="danger" onclick="clearRow(${r[3]})">Clear</button>`:''}</td></tr>`).join('');
  }catch(e){console.error(e);document.getElementById('msg').innerText='Error loading monitor';}
}
async function clearRow(row){ if(!confirm('Clear row '+row+'?'))return; await apiJson('/clear',{method:'POST',body:JSON.stringify({row})}); loadMonitor(); }
window.addEventListener('load',loadMonitor);
</script>
</body>
</html>
